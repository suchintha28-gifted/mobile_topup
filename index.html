<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gifted Top-Up Prototype</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        #root {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .phone-frame {
            width: 393px;
            height: 852px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // Lucide icons as SVG components
        const ChevronLeft = ({ size = 24, ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        );

        const Eye = ({ size = 24, ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        );

        const Star = ({ size = 24, ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
            </svg>
        );

        const Receipt = ({ size = 24, ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1z"></path>
                <path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"></path>
                <path d="M12 17V7"></path>
            </svg>
        );

        const FileText = ({ size = 24, ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
        );

        const Info = ({ size = 24, ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
        );

        const CreditCard = ({ size = 24, ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                <line x1="1" y1="10" x2="23" y2="10"></line>
            </svg>
        );

        const Settings = ({ size = 24, ...props }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 1v6m0 6v6m5.196-15.196l-4.242 4.242m-2.828 2.828l-4.242 4.242m15.556-7.072l-4.242 4.242m-2.828 2.828l-4.242 4.242"></path>
            </svg>
        );

        // Mock configurations
        const FREEHAND_CONFIG = {
            cardBalance: 1000,
            currency: 'SEK',
            minTopUpValue: 100,
            maxTopUpValue: 5000,
            cardId: '2223 0000 0000 0007',
            validThrough: '2025-12-12',
            merchantName: 'Moderna Museet',
            denominationType: 'freehand'
        };

        const FIXED_CONFIG = {
            cardBalance: 1000,
            currency: 'SEK',
            minTopUpValue: 100,
            maxTopUpValue: 5000,
            cardId: '2223 0000 0000 0007',
            validThrough: '2025-12-12',
            merchantName: 'Moderna Museet',
            denominationType: 'fixed',
            fixedDenominations: [100, 200, 500, 1000, 2000]
        };

        const PAYMENT_METHODS = [
            { id: 'card', name: 'Payment Card', icon: '💳' },
            { id: 'swish', name: 'Swish', icon: '🔄' }
        ];

        function App() {
            const [workflowType, setWorkflowType] = useState(null);

            if (!workflowType) {
                return (
                    <div className="phone-frame">
                        <WorkflowSelector onSelect={setWorkflowType} />
                    </div>
                );
            }

            return (
                <div className="phone-frame">
                    {workflowType === 'freehand' ? (
                        <FreehandWorkflow onReset={() => setWorkflowType(null)} />
                    ) : (
                        <FixedWorkflow onReset={() => setWorkflowType(null)} />
                    )}
                </div>
            );
        }

        function WorkflowSelector({ onSelect }) {
            return (
                <div className="h-full flex flex-col" style={{backgroundColor: '#F8F8F8'}}>
                    <StatusBar />
                    
                    <div className="flex-1 flex flex-col items-center justify-center px-8">
                        <div className="w-20 h-20 rounded-full mb-6 flex items-center justify-center" style={{backgroundColor: '#4062cc'}}>
                            <span className="text-4xl">🎁</span>
                        </div>
                        
                        <h1 className="text-3xl font-bold mb-3 text-black text-center">Gifted Top-Up</h1>
                        <p className="text-base mb-12 text-center" style={{color: '#696767'}}>
                            Select a workflow to demonstrate
                        </p>

                        <div className="w-full space-y-4">
                            <button
                                onClick={() => onSelect('freehand')}
                                className="w-full p-6 rounded-2xl border-2 transition-all text-left"
                                style={{borderColor: '#4062cc', backgroundColor: 'white'}}
                            >
                                <div className="text-xl font-bold text-black mb-2">Freehand Denominations</div>
                                <p className="text-sm" style={{color: '#696767'}}>
                                    Enter any amount between 100-5000 SEK
                                </p>
                                <div className="mt-3 inline-block px-3 py-1 rounded-full text-xs font-medium" style={{backgroundColor: '#E8F4FD', color: '#0066CC'}}>
                                    Variable Amount
                                </div>
                            </button>

                            <button
                                onClick={() => onSelect('fixed')}
                                className="w-full p-6 rounded-2xl border-2 transition-all text-left"
                                style={{borderColor: '#ff534a', backgroundColor: 'white'}}
                            >
                                <div className="text-xl font-bold text-black mb-2">Fixed Denominations</div>
                                <p className="text-sm" style={{color: '#696767'}}>
                                    Select from preset amounts: 100, 200, 500, 1000, 2000 SEK
                                </p>
                                <div className="mt-3 inline-block px-3 py-1 rounded-full text-xs font-medium" style={{backgroundColor: '#FFE8E6', color: '#ff534a'}}>
                                    Preset Amounts
                                </div>
                            </button>
                        </div>

                        <p className="text-xs mt-12 text-center" style={{color: '#9E9E9E'}}>
                            Gifted Platform • March 2026<br/>
                            All Cards Top-Up Feature Demo
                        </p>
                    </div>
                </div>
            );
        }

        function FreehandWorkflow({ onReset }) {
            const [screen, setScreen] = useState('card-details');
            const [cardBalance, setCardBalance] = useState(FREEHAND_CONFIG.cardBalance);
            const [purchaseAmount, setPurchaseAmount] = useState('');
            const [topUpAmount, setTopUpAmount] = useState('');
            const [selectedPaymentMethod, setSelectedPaymentMethod] = useState('');
            const [flowType, setFlowType] = useState('');
            const [error, setError] = useState('');
            const [showMoreExpanded, setShowMoreExpanded] = useState(false);
            const [activeTab, setActiveTab] = useState('cards');

            const config = FREEHAND_CONFIG;

            const calculateShortfall = () => {
                const purchase = parseFloat(purchaseAmount) || 0;
                return Math.max(0, purchase - cardBalance);
            };

            const validateAmount = (amount) => {
                const value = parseFloat(amount);
                if (isNaN(value) || value <= 0) {
                    return 'Please enter a valid amount';
                }
                if (value < config.minTopUpValue) {
                    return `Minimum top-up is ${config.minTopUpValue} ${config.currency}`;
                }
                if (value > config.maxTopUpValue) {
                    return `Maximum top-up is ${config.maxTopUpValue} ${config.currency}`;
                }
                return '';
            };

            const handleRevealCode = () => {
                setFlowType('reveal-code');
                setScreen('enter-purchase-amount');
                setError('');
            };

            const handleTopUp = () => {
                setFlowType('top-up');
                setScreen('enter-topup-amount');
                setError('');
            };

            const handlePurchaseAmountNext = () => {
                const purchase = parseFloat(purchaseAmount);
                if (isNaN(purchase) || purchase <= 0) {
                    setError('Please enter a valid purchase amount');
                    return;
                }
                
                if (purchase <= cardBalance) {
                    setScreen('code-revealed');
                } else {
                    const shortfall = calculateShortfall();
                    setTopUpAmount(shortfall.toString());
                    setScreen('payment-options');
                }
            };

            const handleTopUpAmountNext = () => {
                const amount = parseFloat(topUpAmount);
                const validationError = validateAmount(amount);
                if (validationError) {
                    setError(validationError);
                    return;
                }
                setError('');
                setScreen('payment-options');
            };

            const handlePaymentMethodSelect = (methodId) => {
                setSelectedPaymentMethod(methodId);
                setScreen('payment-details');
                
                setTimeout(() => {
                    handlePaymentComplete();
                }, 1000);
            };

            const handlePaymentComplete = () => {
                setScreen('payment-processing');
                
                setTimeout(() => {
                    const amount = parseFloat(topUpAmount);
                    setCardBalance(prev => prev + amount);
                    setScreen('payment-success');
                }, 2000);
            };

            const handleSuccessNext = () => {
                if (flowType === 'reveal-code') {
                    setScreen('code-revealed');
                } else {
                    resetFlow();
                }
            };

            const resetFlow = () => {
                setScreen('card-details');
                setPurchaseAmount('');
                setTopUpAmount('');
                setSelectedPaymentMethod('');
                setFlowType('');
                setError('');
                setShowMoreExpanded(false);
            };

            return (
                <>
                    {screen === 'card-details' && <CardDetailsScreen config={config} cardBalance={cardBalance} onRevealCode={handleRevealCode} onTopUp={handleTopUp} onReset={onReset} activeTab={activeTab} setActiveTab={setActiveTab} />}
                    {screen === 'enter-purchase-amount' && <EnterPurchaseAmountScreen config={config} cardBalance={cardBalance} purchaseAmount={purchaseAmount} setPurchaseAmount={setPurchaseAmount} onNext={handlePurchaseAmountNext} onBack={resetFlow} showMoreExpanded={showMoreExpanded} setShowMoreExpanded={setShowMoreExpanded} topUpAmount={topUpAmount} onTopUp={() => setScreen('payment-options')} />}
                    {screen === 'enter-topup-amount' && <EnterTopUpAmountScreen config={config} cardBalance={cardBalance} topUpAmount={topUpAmount} setTopUpAmount={setTopUpAmount} error={error} setError={setError} onNext={handleTopUpAmountNext} onBack={resetFlow} />}
                    {screen === 'payment-options' && <PaymentOptionsScreen onSelect={handlePaymentMethodSelect} />}
                    {screen === 'payment-details' && <PaymentDetailsScreen amount={topUpAmount} currency={config.currency} paymentMethod={selectedPaymentMethod} />}
                    {screen === 'payment-processing' && <PaymentProcessingScreen />}
                    {screen === 'payment-success' && <PaymentSuccessScreen amount={topUpAmount} currency={config.currency} balance={cardBalance} onNext={handleSuccessNext} />}
                    {screen === 'code-revealed' && <CodeRevealedScreen balance={cardBalance} currency={config.currency} onBack={resetFlow} />}
                </>
            );
        }

        function FixedWorkflow({ onReset }) {
            const [screen, setScreen] = useState('card-details');
            const [cardBalance, setCardBalance] = useState(FIXED_CONFIG.cardBalance);
            const [purchaseAmount, setPurchaseAmount] = useState('');
            const [selectedDenomination, setSelectedDenomination] = useState(null);
            const [selectedPaymentMethod, setSelectedPaymentMethod] = useState('');
            const [flowType, setFlowType] = useState('');
            const [error, setError] = useState('');
            const [showMoreExpanded, setShowMoreExpanded] = useState(false);
            const [activeTab, setActiveTab] = useState('cards');

            const config = FIXED_CONFIG;

            const calculateShortfall = () => {
                const purchase = parseFloat(purchaseAmount) || 0;
                return Math.max(0, purchase - cardBalance);
            };

            const handleRevealCode = () => {
                setFlowType('reveal-code');
                setScreen('enter-purchase-amount');
                setError('');
                setSelectedDenomination(null);
            };

            const handleTopUp = () => {
                setFlowType('top-up');
                setScreen('select-denomination');
                setError('');
                setSelectedDenomination(null);
            };

            const handlePurchaseAmountNext = () => {
                const purchase = parseFloat(purchaseAmount);
                if (isNaN(purchase) || purchase <= 0) {
                    setError('Please enter a valid purchase amount');
                    return;
                }
                setScreen('code-revealed');
            };

            const handleDenominationSelect = (amount) => {
                setSelectedDenomination(amount);
                setError('');
            };

            const handleDenominationNext = () => {
                if (!selectedDenomination) {
                    setError('Please select a top-up amount');
                    return;
                }
                setError('');
                setScreen('payment-options');
            };

            const handlePaymentMethodSelect = (methodId) => {
                setSelectedPaymentMethod(methodId);
                setScreen('payment-details');
                
                setTimeout(() => {
                    handlePaymentComplete();
                }, 1000);
            };

            const handlePaymentComplete = () => {
                setScreen('payment-processing');
                
                setTimeout(() => {
                    const amount = selectedDenomination;
                    setCardBalance(prev => prev + amount);
                    setScreen('payment-success');
                }, 2000);
            };

            const handleSuccessNext = () => {
                if (flowType === 'reveal-code') {
                    setScreen('code-revealed');
                } else {
                    resetFlow();
                }
            };

            const resetFlow = () => {
                setScreen('card-details');
                setPurchaseAmount('');
                setSelectedDenomination(null);
                setSelectedPaymentMethod('');
                setFlowType('');
                setError('');
                setShowMoreExpanded(false);
            };

            return (
                <>
                    {screen === 'card-details' && <CardDetailsScreen config={config} cardBalance={cardBalance} onRevealCode={handleRevealCode} onTopUp={handleTopUp} onReset={onReset} activeTab={activeTab} setActiveTab={setActiveTab} />}
                    {screen === 'enter-purchase-amount' && <EnterPurchaseAmountScreenFixed config={config} cardBalance={cardBalance} purchaseAmount={purchaseAmount} setPurchaseAmount={setPurchaseAmount} selectedDenomination={selectedDenomination} onDenominationSelect={handleDenominationSelect} onNext={handlePurchaseAmountNext} onBack={resetFlow} showMoreExpanded={showMoreExpanded} setShowMoreExpanded={setShowMoreExpanded} onPaymentOptions={() => setScreen('payment-options')} />}
                    {screen === 'select-denomination' && <SelectDenominationScreen config={config} cardBalance={cardBalance} selectedDenomination={selectedDenomination} onSelect={handleDenominationSelect} error={error} onNext={handleDenominationNext} onBack={resetFlow} />}
                    {screen === 'payment-options' && <PaymentOptionsScreen onSelect={handlePaymentMethodSelect} />}
                    {screen === 'payment-details' && <PaymentDetailsScreen amount={selectedDenomination} currency={config.currency} paymentMethod={selectedPaymentMethod} />}
                    {screen === 'payment-processing' && <PaymentProcessingScreen />}
                    {screen === 'payment-success' && <PaymentSuccessScreenFixed amount={selectedDenomination} currency={config.currency} balance={cardBalance} onNext={handleSuccessNext} />}
                    {screen === 'code-revealed' && <CodeRevealedScreen balance={cardBalance} currency={config.currency} onBack={resetFlow} />}
                </>
            );
        }

        // Shared Components
        function StatusBar() {
            return (
                <div className="flex justify-between items-center px-6 py-3 bg-white" style={{flexShrink: 0}}>
                    <span className="font-semibold text-sm">9:41</span>
                    <div className="flex gap-1 items-center">
                        <svg width="18" height="12" viewBox="0 0 18 12"><rect width="18" height="12" rx="2" fill="black"/></svg>
                    </div>
                </div>
            );
        }

        function MenuItem({ icon, text, last }) {
            return (
                <div className="flex items-center gap-3 px-6 py-3" style={{borderBottom: last ? 'none' : '1px solid #ececec'}}>
                    <div className="text-black">{icon}</div>
                    <span className="text-sm font-medium text-black">{text}</span>
                </div>
            );
        }

        function BottomNav({ activeTab, setActiveTab, onReset }) {
            return (
                <div className="bg-white border-t flex justify-around py-2" style={{borderColor: '#E5E5E5', position: 'absolute', bottom: 0, left: 0, right: 0}}>
                    <button 
                        onClick={() => setActiveTab('cards')}
                        className="flex flex-col items-center gap-1 py-2 px-6"
                    >
                        <CreditCard size={24} style={{color: activeTab === 'cards' ? '#4062cc' : '#9E9E9E'}} />
                        <span className="text-xs font-medium" style={{color: activeTab === 'cards' ? '#4062cc' : '#9E9E9E'}}>My Cards</span>
                    </button>
                    <button 
                        onClick={onReset}
                        className="flex flex-col items-center gap-1 py-2 px-6"
                    >
                        <Settings size={24} style={{color: '#9E9E9E'}} />
                        <span className="text-xs font-medium" style={{color: '#9E9E9E'}}>Reset Demo</span>
                    </button>
                </div>
            );
        }

        function CardDetailsScreen({ config, cardBalance, onRevealCode, onTopUp, onReset, activeTab, setActiveTab }) {
            return (
                <div className="h-full bg-white flex flex-col">
                    <StatusBar />
                    <div className="flex justify-between items-center px-4 py-3" style={{flexShrink: 0}}>
                        <button onClick={onReset} className="flex items-center gap-1" style={{color: '#4062cc'}}>
                            <ChevronLeft size={20} />
                            <span className="font-medium text-base">Back</span>
                        </button>
                        <button className="flex items-center gap-1 text-sm" style={{color: '#4062cc'}}>
                            <Eye size={14} />
                            <span>View Greeting</span>
                        </button>
                    </div>

                    <div style={{flex: 1, overflowY: 'auto', paddingBottom: '80px'}}>
                        <div className="px-4 mt-4">
                            <div className="bg-white border rounded-3xl shadow-lg p-6 h-48 flex flex-col justify-between" style={{borderColor: '#edeff3', boxShadow: '0px 4px 20px 0px rgba(173, 173, 173, 0.25)'}}>
                                <div>
                                    <p className="text-lg font-medium mb-1">Presentkort</p>
                                    <p className="text-xs text-gray-500">Gift Card • {config.denominationType === 'fixed' ? 'Fixed Denominations' : 'Freehand'}</p>
                                </div>
                                <div className="text-3xl font-bold" style={{fontFamily: 'cursive'}}>
                                    {config.merchantName}
                                </div>
                            </div>
                        </div>

                        <div className="px-4 mt-6 space-y-3">
                            <button 
                                onClick={onRevealCode}
                                className="w-full text-white py-3 rounded-full font-medium text-base"
                                style={{backgroundColor: '#4062cc'}}
                            >
                                Reveal Code
                            </button>
                            <button 
                                onClick={onTopUp}
                                className="w-full text-white py-3 rounded-full font-medium text-base"
                                style={{backgroundColor: '#ff534a'}}
                            >
                                Top Up
                            </button>
                        </div>

                        <div className="px-4 mt-5 space-y-2">
                            <div className="flex justify-between items-center">
                                <span className="text-sm font-medium" style={{color: '#696767'}}>Card ID</span>
                                <span className="text-sm font-medium text-black">{config.cardId}</span>
                            </div>
                            <div className="flex justify-between items-center">
                                <span className="text-sm font-medium" style={{color: '#696767'}}>Balance</span>
                                <span className="text-sm font-medium text-black">{cardBalance} {config.currency}</span>
                            </div>
                            <div className="flex justify-between items-center">
                                <span className="text-sm font-medium" style={{color: '#696767'}}>Valid Through</span>
                                <span className="text-sm font-medium text-black">{config.validThrough}</span>
                            </div>
                            <div className="flex justify-between items-center">
                                <span className="text-sm font-medium" style={{color: '#696767'}}>Type</span>
                                <span className="text-sm font-medium text-black">{config.denominationType === 'fixed' ? 'Fixed Denominations' : 'Freehand'}</span>
                            </div>
                        </div>

                        <div className="mt-6" style={{borderTop: '1px solid #ececec'}}>
                            <MenuItem icon={<Star size={18} />} text="View Greeting" />
                            <MenuItem icon={<Receipt size={18} />} text="Transaction History" />
                            <MenuItem icon={<Info size={18} />} text="Brand Information" />
                            <MenuItem icon={<FileText size={18} />} text="Terms & Policies" last />
                        </div>

                        <div className="px-4 mt-4 mb-6">
                            <button className="w-full border py-3 rounded-full font-medium text-base" style={{borderColor: '#979797', color: '#979797'}}>
                                Delete Card
                            </button>
                        </div>
                    </div>

                    <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} onReset={onReset} />
                </div>
            );
        }

        // Freehand specific screens
        function EnterPurchaseAmountScreen({ config, cardBalance, purchaseAmount, setPurchaseAmount, onNext, onBack, showMoreExpanded, setShowMoreExpanded, topUpAmount, onTopUp }) {
            const purchaseValue = parseFloat(purchaseAmount) || 0;
            const hasShortfall = purchaseValue > cardBalance;
            const shortfall = hasShortfall ? purchaseValue - cardBalance : 0;
            const inputRef = useRef(null);

            return (
                <div className="h-full flex flex-col" style={{backgroundColor: '#F8F8F8'}}>
                    <style>{`
                        input[type=number]::-webkit-inner-spin-button,
                        input[type=number]::-webkit-outer-spin-button {
                            -webkit-appearance: none;
                            margin: 0;
                        }
                        input[type=number] {
                            -moz-appearance: textfield;
                        }
                    `}</style>

                    <StatusBar />
                    
                    <div className="bg-white px-4 py-3 flex items-center justify-center relative" style={{flexShrink: 0}}>
                        <button onClick={onBack} className="absolute left-4" style={{color: '#000'}}>
                            <ChevronLeft size={28} strokeWidth={2} />
                        </button>
                        <h1 className="text-lg font-bold text-black">Enter Purchase Amount</h1>
                    </div>

                    <div style={{flex: 1, overflowY: 'auto', padding: '16px'}}>
                        <div className="rounded-2xl p-4 mb-4 flex justify-between items-center" style={{backgroundColor: '#FFF9F0', border: '1px solid #F0E5D3'}}>
                            <span className="text-sm" style={{color: '#B4A89A'}}>Current Gift Card Balance</span>
                            <span className="text-lg font-bold text-black">{cardBalance} {config.currency}</span>
                        </div>

                        <div className="mb-4">
                            <div

                                <span className="text-sm" style={{color: '#757575'}}>Top-up Amount</span>
                                <span className="text-lg font-bold" style={{color: '#4CAF50'}}>+{amount} {currency}</span>
                            </div>
                            <div className="flex justify-between items-center">
                                <span className="text-sm" style={{color: '#757575'}}>New Balance</span>
                                <span className="text-xl font-bold text-black">{balance} {currency}</span>
                            </div>
                        </div>
                        
                        <button 
                            onClick={onNext}
                            className="w-full text-white py-4 rounded-full font-semibold text-lg mb-8"
                            style={{backgroundColor: '#5B7FD8', maxWidth: '384px'}}
                        >
                            See my Gift Card
                        </button>

                        <p className="text-sm" style={{color: '#757575'}}>
                            Need a help? <span className="underline font-medium text-black">Contact Support</span>
                        </p>
                    </div>
                </div>
            );
        }

        function CodeRevealedScreen({ balance, currency, onBack }) {
            return (
                <div className="h-full bg-white flex flex-col items-center justify-center px-6">
                    <div className="text-center w-full">
                        <div className="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6" style={{backgroundColor: '#4062cc'}}>
                            <span className="text-white text-3xl">🎁</span>
                        </div>
                        <h2 className="text-2xl font-bold mb-3 text-black">Your Gift Code</h2>
                        <p className="text-base mb-8" style={{color: '#696767'}}>Use this code for your purchase</p>
                        <div className="rounded-xl p-6 mb-6" style={{backgroundColor: '#f7f7f7'}}>
                            <p className="text-2xl font-bold tracking-wider text-black">GIFT-2024-XXXX</p>
                        </div>
                        <div className="rounded-xl p-4 mb-8" style={{backgroundColor: '#e8f4ff', border: '1px solid #b3d9ff'}}>
                            <p className="text-sm font-medium mb-1" style={{color: '#004080'}}>Updated Balance</p>
                            <p className="text-xl font-bold" style={{color: '#004080'}}>{balance.toFixed(2)} {currency}</p>
                        </div>
                        <button onClick={onBack} className="w-full text-white py-3 rounded-full font-medium text-base" style={{backgroundColor: '#4062cc'}}>Back to Card</button>
                    </div>
                </div>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
