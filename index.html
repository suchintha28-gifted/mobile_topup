<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gifted Top-Up Workflows</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background-color: #f5f5f5;
            overflow-x: hidden;
        }
        #root {
            max-width: 393px;
            margin: 0 auto;
            background-color: white;
            min-height: 100vh;
        }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        input:focus {
            outline: none;
        }
        button {
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // Mock configurations
        const FREEHAND_CONFIG = {
            cardBalance: 1000,
            currency: 'SEK',
            minTopUpValue: 100,
            maxTopUpValue: 5000,
            cardId: '2223 0000 0000 0007',
            validThrough: '2025-12-12',
            merchantName: 'Moderna Museet',
            denominationType: 'freehand'
        };

        const FIXED_CONFIG = {
            cardBalance: 1000,
            currency: 'SEK',
            minTopUpValue: 100,
            maxTopUpValue: 5000,
            cardId: '2223 0000 0000 0007',
            validThrough: '2025-12-12',
            merchantName: 'Moderna Museet',
            denominationType: 'fixed',
            fixedDenominations: [100, 200, 500, 1000, 2000]
        };

        const PAYMENT_METHODS = [
            { id: 'card', name: 'Payment Card', icon: '💳' },
            { id: 'swish', name: 'Swish', icon: '🔄' }
        ];

        function App() {
            const [workflowType, setWorkflowType] = useState(null);

            if (!workflowType) {
                return <WorkflowSelector onSelect={setWorkflowType} />;
            }

            return workflowType === 'freehand' ? (
                <FreehandWorkflow onReset={() => setWorkflowType(null)} />
            ) : (
                <FixedWorkflow onReset={() => setWorkflowType(null)} />
            );
        }

        function WorkflowSelector({ onSelect }) {
            return (
                <div style={{height: '100vh', display: 'flex', flexDirection: 'column', backgroundColor: '#F8F8F8', maxWidth: '393px', margin: '0 auto'}}>
                    <StatusBar />
                    
                    <div style={{flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 2rem'}}>
                        <div style={{width: '5rem', height: '5rem', borderRadius: '9999px', marginBottom: '1.5rem', display: 'flex', alignItems: 'center', justifyContent: 'center', backgroundColor: '#4062cc'}}>
                            <span style={{fontSize: '2.25rem'}}>🎁</span>
                        </div>
                        
                        <h1 style={{fontSize: '1.875rem', fontWeight: 700, marginBottom: '0.75rem', color: '#000', textAlign: 'center'}}>Gifted Top-Up</h1>
                        <p style={{fontSize: '1rem', marginBottom: '3rem', textAlign: 'center', color: '#696767'}}>
                            Select a workflow to demonstrate
                        </p>

                        <div style={{width: '100%', display: 'flex', flexDirection: 'column', gap: '1rem'}}>
                            <button
                                onClick={() => onSelect('freehand')}
                                style={{width: '100%', padding: '1.5rem', borderRadius: '1rem', border: '2px solid #4062cc', backgroundColor: 'white', textAlign: 'left', cursor: 'pointer'}}
                            >
                                <div style={{fontSize: '1.25rem', fontWeight: 700, color: '#000', marginBottom: '0.5rem'}}>Freehand Denominations</div>
                                <p style={{fontSize: '0.875rem', color: '#696767'}}>
                                    Enter any amount between 100-5000 SEK
                                </p>
                                <div style={{marginTop: '0.75rem', display: 'inline-block', padding: '0.25rem 0.75rem', borderRadius: '9999px', fontSize: '0.75rem', fontWeight: 500, backgroundColor: '#E8F4FD', color: '#0066CC'}}>
                                    Variable Amount
                                </div>
                            </button>

                            <button
                                onClick={() => onSelect('fixed')}
                                style={{width: '100%', padding: '1.5rem', borderRadius: '1rem', border: '2px solid #ff534a', backgroundColor: 'white', textAlign: 'left', cursor: 'pointer'}}
                            >
                                <div style={{fontSize: '1.25rem', fontWeight: 700, color: '#000', marginBottom: '0.5rem'}}>Fixed Denominations</div>
                                <p style={{fontSize: '0.875rem', color: '#696767'}}>
                                    Select from preset amounts: 100, 200, 500, 1000, 2000 SEK
                                </p>
                                <div style={{marginTop: '0.75rem', display: 'inline-block', padding: '0.25rem 0.75rem', borderRadius: '9999px', fontSize: '0.75rem', fontWeight: 500, backgroundColor: '#FFE8E6', color: '#ff534a'}}>
                                    Preset Amounts
                                </div>
                            </button>
                        </div>

                        <p style={{fontSize: '0.75rem', marginTop: '3rem', textAlign: 'center', color: '#9E9E9E'}}>
                            Gifted Platform • March 2026<br/>
                            All Cards Top-Up Feature Demo
                        </p>
                    </div>
                </div>
            );
        }

        function FreehandWorkflow({ onReset }) {
            const [screen, setScreen] = useState('card-details');
            const [cardBalance, setCardBalance] = useState(FREEHAND_CONFIG.cardBalance);
            const [purchaseAmount, setPurchaseAmount] = useState('');
            const [topUpAmount, setTopUpAmount] = useState('');
            const [selectedPaymentMethod, setSelectedPaymentMethod] = useState('');
            const [flowType, setFlowType] = useState('');
            const [error, setError] = useState('');
            const [showMoreExpanded, setShowMoreExpanded] = useState(false);
            const [activeTab, setActiveTab] = useState('cards');

            const config = FREEHAND_CONFIG;

            const handleRevealCode = () => {
                setFlowType('reveal-code');
                setScreen('enter-purchase-amount');
                setError('');
            };

            const handlePurchaseAmountNext = () => {
                const purchase = parseFloat(purchaseAmount);
                if (isNaN(purchase) || purchase <= 0) {
                    setError('Please enter a valid purchase amount');
                    return;
                }
                if (purchase <= cardBalance) {
                    setScreen('code-revealed');
                } else {
                    const shortfall = Math.max(0, purchase - cardBalance);
                    setTopUpAmount(shortfall.toString());
                    setScreen('payment-options');
                }
            };

            const handleTopUpAmountNext = () => {
                const amount = parseFloat(topUpAmount);
                if (isNaN(amount) || amount <= 0) {
                    setError('Please enter a valid amount');
                    return;
                }
                if (amount < config.minTopUpValue) {
                    setError(`Minimum top-up is ${config.minTopUpValue} ${config.currency}`);
                    return;
                }
                if (amount > config.maxTopUpValue) {
                    setError(`Maximum top-up is ${config.maxTopUpValue} ${config.currency}`);
                    return;
                }
                setError('');
                setScreen('payment-options');
            };

            const handlePaymentMethodSelect = (methodId) => {
                setSelectedPaymentMethod(methodId);
                setScreen('payment-details');
                setTimeout(() => {
                    setScreen('payment-processing');
                    setTimeout(() => {
                        const amount = parseFloat(topUpAmount);
                        setCardBalance(prev => prev + amount);
                        setScreen('payment-success');
                    }, 2000);
                }, 1000);
            };

            const handleSuccessNext = () => {
                if (flowType === 'reveal-code') {
                    setScreen('code-revealed');
                } else {
                    resetFlow();
                }
            };

            const resetFlow = () => {
                setScreen('card-details');
                setPurchaseAmount('');
                setTopUpAmount('');
                setSelectedPaymentMethod('');
                setFlowType('');
                setError('');
                setShowMoreExpanded(false);
            };

            const screens = {
                'card-details': <CardDetailsScreen config={config} cardBalance={cardBalance} onRevealCode={handleRevealCode} onTopUp={() => {}} onReset={onReset} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'enter-purchase-amount': <EnterPurchaseAmountScreen config={config} cardBalance={cardBalance} purchaseAmount={purchaseAmount} setPurchaseAmount={setPurchaseAmount} onNext={handlePurchaseAmountNext} onBack={resetFlow} showMoreExpanded={showMoreExpanded} setShowMoreExpanded={setShowMoreExpanded} topUpAmount={topUpAmount} onTopUp={() => setScreen('payment-options')} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'enter-topup-amount': <EnterTopUpAmountScreen config={config} cardBalance={cardBalance} topUpAmount={topUpAmount} setTopUpAmount={setTopUpAmount} error={error} setError={setError} onNext={handleTopUpAmountNext} onBack={resetFlow} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'payment-options': <PaymentOptionsScreen onSelect={handlePaymentMethodSelect} onBack={() => setScreen(flowType === 'top-up' ? 'enter-topup-amount' : 'enter-purchase-amount')} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'payment-details': <PaymentDetailsScreen amount={topUpAmount} currency={config.currency} paymentMethod={selectedPaymentMethod} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'payment-processing': <PaymentProcessingScreen activeTab={activeTab} setActiveTab={setActiveTab} />,
                'payment-success': <PaymentSuccessScreen amount={topUpAmount} currency={config.currency} balance={cardBalance} onNext={handleSuccessNext} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'code-revealed': <CodeRevealedScreen balance={cardBalance} currency={config.currency} onBack={resetFlow} activeTab={activeTab} setActiveTab={setActiveTab} />
            };

            return screens[screen];
        }

        function FixedWorkflow({ onReset }) {
            const [screen, setScreen] = useState('card-details');
            const [cardBalance, setCardBalance] = useState(FIXED_CONFIG.cardBalance);
            const [purchaseAmount, setPurchaseAmount] = useState('');
            const [selectedDenomination, setSelectedDenomination] = useState(null);
            const [selectedPaymentMethod, setSelectedPaymentMethod] = useState('');
            const [flowType, setFlowType] = useState('');
            const [error, setError] = useState('');
            const [showMoreExpanded, setShowMoreExpanded] = useState(false);
            const [activeTab, setActiveTab] = useState('cards');

            const config = FIXED_CONFIG;

            const handleRevealCode = () => {
                setFlowType('reveal-code');
                setScreen('enter-purchase-amount');
                setError('');
                setSelectedDenomination(null);
            };

            const handlePurchaseAmountNext = () => {
                const purchase = parseFloat(purchaseAmount);
                if (isNaN(purchase) || purchase <= 0) {
                    setError('Please enter a valid purchase amount');
                    return;
                }
                setScreen('code-revealed');
            };

            const handleDenominationSelect = (amount) => {
                setSelectedDenomination(amount);
                setError('');
            };

            const handleDenominationNext = () => {
                if (!selectedDenomination) {
                    setError('Please select a top-up amount');
                    return;
                }
                setError('');
                setScreen('payment-options');
            };

            const handlePaymentMethodSelect = (methodId) => {
                setSelectedPaymentMethod(methodId);
                setScreen('payment-details');
                setTimeout(() => {
                    setScreen('payment-processing');
                    setTimeout(() => {
                        setCardBalance(prev => prev + selectedDenomination);
                        setScreen('payment-success');
                    }, 2000);
                }, 1000);
            };

            const handleSuccessNext = () => {
                if (flowType === 'reveal-code') {
                    setScreen('code-revealed');
                } else {
                    resetFlow();
                }
            };

            const resetFlow = () => {
                setScreen('card-details');
                setPurchaseAmount('');
                setSelectedDenomination(null);
                setSelectedPaymentMethod('');
                setFlowType('');
                setError('');
                setShowMoreExpanded(false);
            };

            const screens = {
                'card-details': <CardDetailsScreen config={config} cardBalance={cardBalance} onRevealCode={handleRevealCode} onTopUp={() => {}} onReset={onReset} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'enter-purchase-amount': <EnterPurchaseAmountScreenFixed config={config} cardBalance={cardBalance} purchaseAmount={purchaseAmount} setPurchaseAmount={setPurchaseAmount} selectedDenomination={selectedDenomination} onDenominationSelect={handleDenominationSelect} onNext={handlePurchaseAmountNext} onBack={resetFlow} showMoreExpanded={showMoreExpanded} setShowMoreExpanded={setShowMoreExpanded} onPaymentOptions={() => setScreen('payment-options')} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'select-denomination': <SelectDenominationScreen config={config} cardBalance={cardBalance} selectedDenomination={selectedDenomination} onSelect={handleDenominationSelect} error={error} onNext={handleDenominationNext} onBack={resetFlow} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'payment-options': <PaymentOptionsScreen onSelect={handlePaymentMethodSelect} onBack={() => setScreen(flowType === 'top-up' ? 'select-denomination' : 'enter-purchase-amount')} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'payment-details': <PaymentDetailsScreen amount={selectedDenomination} currency={config.currency} paymentMethod={selectedPaymentMethod} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'payment-processing': <PaymentProcessingScreen activeTab={activeTab} setActiveTab={setActiveTab} />,
                'payment-success': <PaymentSuccessScreenFixed amount={selectedDenomination} currency={config.currency} balance={cardBalance} onNext={handleSuccessNext} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'code-revealed': <CodeRevealedScreen balance={cardBalance} currency={config.currency} onBack={resetFlow} activeTab={activeTab} setActiveTab={setActiveTab} />
            };

            return screens[screen];
        }

        function StatusBar() {
            return (
                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.75rem 1.5rem', backgroundColor: 'white', flexShrink: 0}}>
                    <span style={{fontWeight: 600, fontSize: '0.875rem'}}>9:41</span>
                    <div style={{display: 'flex', gap: '0.25rem', alignItems: 'center'}}>
                        <svg width="18" height="12" viewBox="0 0 18 12"><rect width="18" height="12" rx="2" fill="black"/></svg>
                    </div>
                </div>
            );
        }

        function BottomNav({ activeTab, setActiveTab }) {
            return (
                <div style={{position: 'fixed', bottom: 0, left: 0, right: 0, backgroundColor: 'white', borderTop: '1px solid #E5E5E5', display: 'flex', justifyContent: 'space-around', padding: '0.5rem 0', maxWidth: '393px', margin: '0 auto'}}>
                    <button 
                        onClick={() => setActiveTab('cards')}
                        style={{display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '0.25rem', padding: '0.5rem 1.5rem', background: 'none', border: 'none', cursor: 'pointer'}}
                    >
                        <lucide.CreditCard size={24} color={activeTab === 'cards' ? '#4062cc' : '#9E9E9E'} />
                        <span style={{fontSize: '0.75rem', fontWeight: 500, color: activeTab === 'cards' ? '#4062cc' : '#9E9E9E'}}>My Cards</span>
                    </button>
                    <button 
                        onClick={() => setActiveTab('settings')}
                        style={{display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '0.25rem', padding: '0.5rem 1.5rem', background: 'none', border: 'none', cursor: 'pointer'}}
                    >
                        <lucide.Settings size={24} color={activeTab === 'settings' ? '#4062cc' : '#9E9E9E'} />
                        <span style={{fontSize: '0.75rem', fontWeight: 500, color: activeTab === 'settings' ? '#4062cc' : '#9E9E9E'}}>Settings</span>
                    </button>
                </div>
            );
        }

        function CardDetailsScreen({ config, cardBalance, onRevealCode, onTopUp, onReset, activeTab, setActiveTab }) {
            return (
                <div style={{height: '100vh', backgroundColor: 'white', display: 'flex', flexDirection: 'column', maxWidth: '393px', margin: '0 auto'}}>
                    <StatusBar />
                    
                    <div style={{padding: '0 16px', marginBottom: '24px', flexShrink: 0}}>
                        <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%'}}>
                            <div onClick={onReset} style={{display: 'flex', gap: '4px', alignItems: 'center', cursor: 'pointer'}}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                    <path d="M15 18L9 12L15 6" stroke="#4062CC" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                                </svg>
                                <p style={{fontFamily: 'Galano Grotesque Alt, -apple-system, sans-serif', fontWeight: 600, fontSize: '16px', color: '#4062cc', margin: 0}}>Back</p>
                            </div>
                            <div style={{display: 'flex', gap: '4px', alignItems: 'center', cursor: 'pointer'}}>
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                    <path d="M7.99813 12.6673C5.51645 12.6673 3.28826 10.9874 2.03787 8.17652C2.01289 8.12092 2 8.06098 2 8.00038C2 7.93972 2.01289 7.87978 2.03787 7.82418C3.28949 5.01275 5.51768 3.33398 7.9988 3.33398C10.4799 3.33398 12.7105 5.01275 13.9621 7.82418C13.9871 7.87978 14 7.93972 14 8.00038C14 8.06098 13.9871 8.12092 13.9621 8.17652C12.7111 10.9874 10.4829 12.6655 8.00187 12.6673H7.99813ZM2.96335 8.00065C4.07467 10.3682 5.94535 11.7753 7.99693 11.7759C10.0485 11.7765 11.9185 10.3682 13.0305 8.00065C11.9179 5.63255 10.0473 4.22536 7.99567 4.22536C5.94411 4.22536 4.07653 5.63255 2.96459 8.00065H2.96335Z" fill="#4062CC"/>
                                    <path d="M7.99885 10.2757C7.53318 10.2757 7.07798 10.1424 6.69078 9.89253C6.30362 9.64266 6.00186 9.28752 5.82369 8.87206C5.64551 8.45659 5.59892 7.99939 5.68981 7.55833C5.7807 7.11726 6.005 6.71219 6.33432 6.39423C6.66364 6.07628 7.08318 5.85979 7.53992 5.77213C7.99665 5.68447 8.47005 5.72958 8.90025 5.90175C9.33045 6.07392 9.69812 6.36543 9.95672 6.73939C10.2153 7.11339 10.3533 7.55299 10.3532 8.00272C10.3523 8.60539 10.1039 9.18306 9.66252 9.60912C9.22118 10.0353 8.62292 10.2749 7.99885 10.2757ZM7.99885 6.61989C7.71578 6.61989 7.43912 6.70093 7.20372 6.85279C6.96838 7.00466 6.78492 7.22053 6.67658 7.47306C6.56822 7.72559 6.53984 8.00346 6.59502 8.27159C6.6502 8.53966 6.78645 8.78599 6.98658 8.97932C7.18665 9.17266 7.44165 9.30432 7.71925 9.35772C7.99685 9.41112 8.28465 9.38386 8.54619 9.27932C8.80772 9.17479 9.03132 8.99772 9.18865 8.77046C9.34598 8.54326 9.43005 8.27606 9.43019 8.00272C9.42965 7.63619 9.27872 7.28486 9.01045 7.02566C8.74212 6.76646 8.37838 6.62053 7.99885 6.61989Z" fill="#4062CC"/>
                                </svg>
                                <p style={{fontFamily: 'Galano Grotesque Alt, -apple-system, sans-serif', fontWeight: 500, fontSize: '14px', color: '#4062cc', margin: 0}}>View Greeting</p>
                            </div>
                        </div>
                    </div>

                    <div style={{flex: 1, overflowY: 'auto', paddingBottom: '80px'}}>
                        <div style={{padding: '0 16px', marginBottom: '24px'}}>
                            <div style={{width: '100%', height: '220px', border: '1px solid #edeff3', borderRadius: '20px', boxShadow: '0px 4px 20px 0px rgba(173, 173, 173, 0.25)', backgroundColor: '#f5f5f5', display: 'flex', flexDirection: 'column', padding: '24px'}}>
                                <div style={{fontFamily: 'SF Pro Display, -apple-system, sans-serif', fontSize: '32px', fontWeight: 700, color: '#000000', marginBottom: 'auto'}}>Presentkort</div>
                                <div style={{fontFamily: 'Brush Script MT, cursive', fontSize: '48px', fontWeight: 400, color: '#000000', textAlign: 'left', marginTop: 'auto', paddingBottom: '20px', letterSpacing: '2px'}}>MODERNA MUSEET</div>
                            </div>
                        </div>

                        <div style={{padding: '0 16px', display: 'flex', flexDirection: 'column', gap: '16px'}}>
                            <button 
                                onClick={onRevealCode}
                                style={{backgroundColor: '#4062cc', color: 'white', padding: '12px 32px', borderRadius: '42px', border: 'none', cursor: 'pointer', fontFamily: 'Galano Grotesque Alt, -apple-system, sans-serif', fontWeight: 600, fontSize: '14px', width: '100%'}}
                            >
                                Reveal Value Code
                            </button>
                            
                            <div style={{display: 'flex', flexDirection: 'column', gap: '8px', fontFamily: 'Galano Grotesque, -apple-system, sans-serif', fontWeight: 500, fontSize: '16px', color: '#000000'}}>
                                <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between'}}>
                                    <p style={{margin: 0}}>Card ID</p>
                                    <p style={{margin: 0}}>{config.cardId}</p>
                                </div>
                                <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between'}}>
                                    <p style={{margin: 0}}>Balance</p>
                                    <p style={{margin: 0}}>{cardBalance} {config.currency}</p>
                                </div>
                                <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between'}}>
                                    <p style={{margin: 0}}>Valid Through</p>
                                    <p style={{margin: 0}}>{config.validThrough}</p>
                                </div>
                            </div>
                        </div>
                        
                        <div style={{padding: 0, marginTop: '24px', display: 'flex', flexDirection: 'column'}}>
                            <div style={{width: '100%', borderBottom: '1px solid #ececec', padding: '14px 16px', cursor: 'pointer'}}>
                                <p style={{fontFamily: 'Galano Grotesque Alt, -apple-system, sans-serif', fontWeight: 700, fontSize: '14px', color: '#4062cc', margin: 0}}>View Greeting</p>
                            </div>
                            <div style={{width: '100%', borderBottom: '1px solid #ececec', padding: '14px 16px', cursor: 'pointer'}}>
                                <p style={{fontFamily: 'Galano Grotesque Alt, -apple-system, sans-serif', fontWeight: 700, fontSize: '14px', color: '#4062cc', margin: 0}}>Transaction History</p>
                            </div>
                            <div style={{width: '100%', borderBottom: '1px solid #ececec', padding: '14px 16px', cursor: 'pointer'}}>
                                <p style={{fontFamily: 'Galano Grotesque Alt, -apple-system, sans-serif', fontWeight: 700, fontSize: '14px', color: '#4062cc', margin: 0}}>Brand Information</p>
                            </div>
                            <div style={{width: '100%', padding: '14px 16px', cursor: 'pointer'}}>
                                <p style={{fontFamily: 'Galano Grotesque Alt, -apple-system, sans-serif', fontWeight: 700, fontSize: '14px', color: '#4062cc', margin: 0}}>Terms & Policies</p>
                            </div>
                        </div>
                        
                        <div style={{padding: '0 16px', marginTop: '24px', marginBottom: '24px'}}>
                            <button style={{width: '100%', backgroundColor: 'white', border: '1px solid #979797', borderRadius: '42px', padding: '12px 32px', cursor: 'pointer', fontFamily: 'Galano Grotesque Alt, -apple-system, sans-serif', fontWeight: 600, fontSize: '16px', color: '#979797'}}>
                                Delete Card
                            </button>
                        </div>
                    </div>

                    <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} />
                </div>
            );
        }

        function EnterPurchaseAmountScreen({ config, cardBalance, purchaseAmount, setPurchaseAmount, onNext, onBack, showMoreExpanded, setShowMoreExpanded, onTopUp, activeTab, setActiveTab }) {
            const purchaseValue = parseFloat(purchaseAmount) || 0;
            const hasShortfall = purchaseValue > cardBalance;
            const shortfall = hasShortfall ? purchaseValue - cardBalance : 0;
            const inputRef = useRef(null);

            return (
                <div style={{height: '100vh', display: 'flex', flexDirection: 'column', backgroundColor: '#F8F8F8', maxWidth: '393px', margin: '0 auto'}}>
                    <StatusBar />
                    
                    <div style={{backgroundColor: 'white', padding: '0.75rem 1rem', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', flexShrink: 0}}>
                        <button onClick={onBack} style={{position: 'absolute', left: '1rem', color: '#000', background: 'none', border: 'none', cursor: 'pointer'}}>
                            <lucide.ChevronLeft size={28} strokeWidth={2} />
                        </button>
                        <h1 style={{fontSize: '1.125rem', fontWeight: 700, color: '#000'}}>Enter Purchase Amount</h1>
                    </div>

                    <div style={{flex: 1, overflowY: 'auto', padding: '16px', paddingBottom: '100px'}}>
                        <div style={{backgroundColor: '#FFF9F0', border: '1px solid #F0E5D3', borderRadius: '1rem', padding: '1rem', marginBottom: '1rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                            <span style={{fontSize: '0.875rem', color: '#B4A89A'}}>Current Gift Card Balance</span>
                            <span style={{fontSize: '1.125rem', fontWeight: 700, color: '#000'}}>{cardBalance} {config.currency}</span>
                        </div>

                        <div style={{marginBottom: '1rem'}}>
                            <div 
                                onClick={() => inputRef.current?.focus()}
                                style={{backgroundColor: 'white', borderRadius: '9999px', padding: '0.75rem 1.25rem', display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'text', border: '1px solid #E5E5E5'}}
                            >
                                <span style={{fontSize: '0.875rem', color: '#B4A89A'}}>Enter Purchase Amount</span>
                                <div style={{display: 'flex', alignItems: 'center', gap: '0.5rem'}}>
                                    <input
                                        ref={inputRef}
                                        type="number"
                                        value={purchaseAmount}
                                        onChange={(e) => setPurchaseAmount(e.target.value)}
                                        style={{fontSize: '1.25rem', fontWeight: 600, color: '#000', textAlign: 'right', backgroundColor: 'transparent', border: 'none', width: '5rem'}}
                                        placeholder="0"
                                        inputMode="numeric"
                                    />
                                    <span style={{fontSize: '1rem', color: '#B4A89A'}}>{config.currency}</span>
                                </div>
                            </div>
                        </div>

                        {hasShortfall && (
                            <div style={{backgroundColor: '#FFF5F5', border: '2px solid #FF4444', borderRadius: '1rem', padding: '1rem', marginBottom: '1rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                <span style={{fontSize: '0.875rem', fontWeight: 600, color: '#000'}}>Gift Card Balance Shortfall</span>
                                <span style={{fontSize: '1.125rem', fontWeight: 700, color: '#FF4444'}}>-{shortfall.toFixed(2)} {config.currency}</span>
                            </div>
                        )}

                        <div style={{marginBottom: '1rem'}}>
                            <p style={{fontSize: '0.875rem', lineHeight: 1.625, color: '#000', fontWeight: 500, marginBottom: '0.25rem'}}>
                                Enter your purchase amount above to check if your Card balance is sufficient to complete your purchase.
                            </p>
                            
                            {showMoreExpanded ? (
                                <>
                                    <p style={{fontSize: '0.875rem', lineHeight: 1.625, color: '#000', marginTop: '0.75rem'}}>
                                        As this merchant doesn't support split payments (paying with first the Gift Card and then the balance with another payment method), the total amount of your purchase needs to be paid from your Gift Card.
                                    </p>
                                    <p style={{fontSize: '0.875rem', lineHeight: 1.625, color: '#000', marginTop: '0.75rem'}}>
                                        Once you filled in the total purchase amount above, you can top-up the Gift Card if the Card balance is lesser than the purchase amount.
                                    </p>
                                </>
                            ) : (
                                <button 
                                    onClick={() => setShowMoreExpanded(true)}
                                    style={{fontSize: '0.875rem', fontWeight: 500, fontStyle: 'italic', marginTop: '0.25rem', color: '#666', cursor: 'pointer', background: 'none', border: 'none', padding: 0}}
                                >
                                    ..... Show more
                                </button>
                            )}
                        </div>
                    </div>

                    <div style={{padding: '16px 16px 24px', backgroundColor: 'white', borderTop: '1px solid #E5E5E5', flexShrink: 0, marginBottom: '80px'}}>
                        {purchaseAmount && (
                            hasShortfall ? (
                                <div style={{display: 'flex', flexDirection: 'column', gap: '12px'}}>
                                    <div style={{backgroundColor: '#FFF9E6', border: '1px solid #FFD966', borderRadius: '16px', padding: '16px'}}>
                                        <div style={{display: 'flex', alignItems: 'flex-start', gap: '8px'}}>
                                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style={{flexShrink: 0, marginTop: '2px'}}>
                                                <circle cx="10" cy="10" r="9" stroke="#B8860B" strokeWidth="1.5"/>
                                                <path d="M10 6V11M10 14V14.5" stroke="#B8860B" strokeWidth="2" strokeLinecap="round"/>
                                            </svg>
                                            <p style={{fontSize: '14px', lineHeight: '1.5', color: '#5C4A1A', margin: 0}}>
                                                <strong style={{fontWeight: 700}}>Important:</strong> Once you reveal your Value Code, it will be valid for a <strong style={{fontWeight: 700}}>one-time transaction only</strong> and cannot be reused.
                                            </p>
                                        </div>
                                    </div>
                                    
                                    <button 
                                        onClick={onTopUp}
                                        style={{width: '100%', backgroundColor: '#5B7FD8', color: 'white', padding: '12px', borderRadius: '999px', border: 'none', fontWeight: 600, fontSize: '16px', cursor: 'pointer'}}
                                    >
                                        Top-up {shortfall.toFixed(2)} {config.currency}
                                    </button>
                                    
                                    <button 
                                        onClick={onNext}
                                        style={{width: '100%', backgroundColor: 'white', color: '#5B7FD8', padding: '12px', borderRadius: '999px', border: '2px solid #5B7FD8', fontWeight: 600, fontSize: '16px', cursor: 'pointer'}}
                                    >
                                        Continue with Card Balance
                                    </button>
                                </div>
                            ) : (
                                <div style={{display: 'flex', flexDirection: 'column', gap: '12px'}}>
                                    <div style={{backgroundColor: '#FFF9E6', border: '1px solid #FFD966', borderRadius: '16px', padding: '16px'}}>
                                        <div style={{display: 'flex', alignItems: 'flex-start', gap: '8px'}}>
                                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style={{flexShrink: 0, marginTop: '2px'}}>
                                                <circle cx="10" cy="10" r="9" stroke="#B8860B" strokeWidth="1.5"/>
                                                <path d="M10 6V11M10 14V14.5" stroke="#B8860B" strokeWidth="2" strokeLinecap="round"/>
                                            </svg>
                                            <p style={{fontSize: '14px', lineHeight: '1.5', color: '#5C4A1A', margin: 0}}>
                                                <strong style={{fontWeight: 700}}>Important:</strong> Once you reveal your Value Code, it will be valid for a <strong style={{fontWeight: 700}}>one-time transaction only</strong> and cannot be reused. The code will be activated for your current Card balance of <strong style={{fontWeight: 700}}>{cardBalance} {config.currency}</strong>.
                                            </p>
                                        </div>
                                    </div>
                                    
                                    <button 
                                        onClick={onNext}
                                        style={{width: '100%', backgroundColor: '#5B7FD8', color: 'white', padding: '12px', borderRadius: '999px', border: 'none', fontWeight: 600, fontSize: '16px', cursor: 'pointer'}}
                                    >
                                        Reveal Value Code
                                    </button>
                                </div>
                            )
                        )}
                    </div>

                    <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} />
                </div>
            );
        }

        // Add remaining screen components here with full implementations
        function EnterPurchaseAmountScreenFixed() { return <div>Fixed Amount Screen - To be implemented</div>; }
        function EnterTopUpAmountScreen() { return <div>Top Up Screen - To be implemented</div>; }
        function SelectDenominationScreen() { return <div>Select Denomination - To be implemented</div>; }
        function PaymentOptionsScreen() { return <div>Payment Options - To be implemented</div>; }
        function PaymentDetailsScreen() { return <div>Payment Details - To be implemented</div>; }
        function PaymentProcessingScreen() { return <div>Processing - To be implemented</div>; }
        function PaymentSuccessScreen() { return <div>Success - To be implemented</div>; }
        function PaymentSuccessScreenFixed() { return <div>Success Fixed - To be implemented</div>; }
        function CodeRevealedScreen({ balance, currency, onBack, activeTab, setActiveTab }) {
            return (
                <div style={{height: '100vh', backgroundColor: 'white', display: 'flex', flexDirection: 'column', maxWidth: '393px', margin: '0 auto'}}>
                    <div style={{flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0 1.5rem 6.25rem'}}>
                        <div style={{textAlign: 'center', width: '100%'}}>
                            <div style={{width: '5rem', height: '5rem', borderRadius: '9999px', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 1.5rem', backgroundColor: '#4062cc'}}>
                                <span style={{color: 'white', fontSize: '1.875rem'}}>🎁</span>
                            </div>
                            <h2 style={{fontSize: '1.5rem', fontWeight: 700, marginBottom: '0.75rem', color: '#000'}}>Your Gift Code</h2>
                            <p style={{fontSize: '1rem', marginBottom: '2rem', color: '#696767'}}>Use this code for your purchase</p>
                            <div style={{borderRadius: '0.75rem', padding: '1.5rem', marginBottom: '1.5rem', backgroundColor: '#f7f7f7'}}>
                                <p style={{fontSize: '1.5rem', fontWeight: 700, letterSpacing: '0.1em', color: '#000'}}>GIFT-2024-XXXX</p>
                            </div>
                            <div style={{borderRadius: '0.75rem', padding: '1rem', marginBottom: '2rem', backgroundColor: '#e8f4ff', border: '1px solid #b3d9ff'}}>
                                <p style={{fontSize: '0.875rem', fontWeight: 500, marginBottom: '0.25rem', color: '#004080'}}>Updated Balance</p>
                                <p style={{fontSize: '1.25rem', fontWeight: 700, color: '#004080'}}>{balance.toFixed(2)} {currency}</p>
                            </div>
                            <button onClick={onBack} style={{width: '100%', color: 'white', padding: '0.75rem', borderRadius: '9999px', fontWeight: 500, fontSize: '1rem', backgroundColor: '#4062cc', border: 'none', cursor: 'pointer'}}>Back to Card</button>
                        </div>
                    </div>
                    <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} />
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
