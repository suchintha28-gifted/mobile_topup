<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gifted Top-Up Demo</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif; }
        * { box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef } = React;

        // Icon Components
        const CreditCard = ({ size = 24, style = {} }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                <line x1="1" y1="10" x2="23" y2="10"/>
            </svg>
        );

        const Settings = ({ size = 24, style = {} }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 1v6m0 6v6m9-9h-6m-6 0H3"/>
            </svg>
        );

        const ChevronLeft = ({ size = 24, style = {} }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        );

        const FREEHAND_CONFIG = {
            cardBalance: 1000,
            currency: 'SEK',
            minTopUpValue: 100,
            maxTopUpValue: 5000,
            cardId: '2223 0000 0000 0007',
            validThrough: '2025-12-12',
            merchantName: 'Moderna Museet',
            denominationType: 'freehand'
        };

        const FIXED_CONFIG = {
            cardBalance: 1000,
            currency: 'SEK',
            minTopUpValue: 100,
            maxTopUpValue: 5000,
            cardId: '2223 0000 0000 0007',
            validThrough: '2025-12-12',
            merchantName: 'Moderna Museet',
            denominationType: 'fixed',
            fixedDenominations: [100, 200, 500, 1000, 2000]
        };

        const PAYMENT_METHODS = [
            { id: 'card', name: 'Payment Card', icon: '💳' },
            { id: 'swish', name: 'Swish', icon: '🔄' }
        ];

        function StatusBar() {
            return (
                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 24px', backgroundColor: 'white', flexShrink: 0, width: '100%', boxSizing: 'border-box'}}>
                    <span style={{fontWeight: 600, fontSize: '14px'}}>9:41</span>
                    <div style={{display: 'flex', gap: '4px', alignItems: 'center'}}>
                        <svg width="18" height="12" viewBox="0 0 18 12"><rect width="18" height="12" rx="2" fill="black"/></svg>
                    </div>
                </div>
            );
        }

        function BottomNav({ activeTab, setActiveTab }) {
            return (
                <div style={{position: 'fixed', bottom: 0, left: '50%', transform: 'translateX(-50%)', backgroundColor: 'white', borderTop: '1px solid #E5E5E5', display: 'flex', justifyContent: 'space-around', padding: '8px 0', width: '100%', maxWidth: '393px', boxSizing: 'border-box'}}>
                    <button onClick={() => setActiveTab('cards')} style={{display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4px', padding: '8px 24px', backgroundColor: 'transparent', border: 'none', cursor: 'pointer'}}>
                        <CreditCard size={24} style={{color: activeTab === 'cards' ? '#4062cc' : '#9E9E9E'}} />
                        <span style={{fontSize: '12px', fontWeight: 500, color: activeTab === 'cards' ? '#4062cc' : '#9E9E9E'}}>My Cards</span>
                    </button>
                    <button onClick={() => setActiveTab('settings')} style={{display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4px', padding: '8px 24px', backgroundColor: 'transparent', border: 'none', cursor: 'pointer'}}>
                        <Settings size={24} style={{color: activeTab === 'settings' ? '#4062cc' : '#9E9E9E'}} />
                        <span style={{fontSize: '12px', fontWeight: 500, color: activeTab === 'settings' ? '#4062cc' : '#9E9E9E'}}>Settings</span>
                    </button>
                </div>
            );
        }

        function WorkflowSelector({ onSelect }) {
            return (
                <div style={{height: '100vh', display: 'flex', flexDirection: 'column', backgroundColor: '#F8F8F8', width: '100%', maxWidth: '393px', margin: '0 auto'}}>
                    <StatusBar />
                    <div style={{flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 32px'}}>
                        <div style={{width: '80px', height: '80px', borderRadius: '50%', marginBottom: '24px', display: 'flex', alignItems: 'center', justifyContent: 'center', backgroundColor: '#4062cc'}}>
                            <span style={{fontSize: '36px'}}>🎁</span>
                        </div>
                        <h1 style={{fontSize: '30px', fontWeight: 'bold', marginBottom: '12px', color: 'black', textAlign: 'center'}}>Gifted Top-Up</h1>
                        <p style={{fontSize: '16px', marginBottom: '48px', textAlign: 'center', color: '#696767'}}>Select a workflow to demonstrate</p>
                        <div style={{width: '100%', display: 'flex', flexDirection: 'column', gap: '16px'}}>
                            <button onClick={() => onSelect('freehand')} style={{width: '100%', padding: '24px', borderRadius: '16px', border: '2px solid #4062cc', backgroundColor: 'white', textAlign: 'left', cursor: 'pointer'}}>
                                <div style={{fontSize: '20px', fontWeight: 'bold', color: 'black', marginBottom: '8px'}}>Freehand Denominations</div>
                                <p style={{fontSize: '14px', color: '#696767', margin: 0}}>Enter any amount between 100-5000 SEK</p>
                                <div style={{marginTop: '12px', display: 'inline-block', padding: '4px 12px', borderRadius: '999px', fontSize: '12px', fontWeight: 500, backgroundColor: '#E8F4FD', color: '#0066CC'}}>Variable Amount</div>
                            </button>
                            <button onClick={() => onSelect('fixed')} style={{width: '100%', padding: '24px', borderRadius: '16px', border: '2px solid #ff534a', backgroundColor: 'white', textAlign: 'left', cursor: 'pointer'}}>
                                <div style={{fontSize: '20px', fontWeight: 'bold', color: 'black', marginBottom: '8px'}}>Fixed Denominations</div>
                                <p style={{fontSize: '14px', color: '#696767', margin: 0}}>Select from preset amounts: 100, 200, 500, 1000, 2000 SEK</p>
                                <div style={{marginTop: '12px', display: 'inline-block', padding: '4px 12px', borderRadius: '999px', fontSize: '12px', fontWeight: 500, backgroundColor: '#FFE8E6', color: '#ff534a'}}>Preset Amounts</div>
                            </button>
                        </div>
                        <p style={{fontSize: '12px', marginTop: '48px', textAlign: 'center', color: '#9E9E9E'}}>Gifted Platform • March 2026<br/>All Cards Top-Up Feature Demo</p>
                    </div>
                </div>
            );
        }

        function CardDetailsScreen({ config, cardBalance, onRevealCode, onTopUpCard, onReset, activeTab, setActiveTab, useNewDesign, toggleDesign }) {
            if (useNewDesign) {
                return <CardDetailsScreenNew config={config} cardBalance={cardBalance} onRevealCode={onRevealCode} onTopUpCard={onTopUpCard} onReset={onReset} activeTab={activeTab} setActiveTab={setActiveTab} toggleDesign={toggleDesign} />;
            }
            return (
                <div style={{height: '100vh', backgroundColor: 'white', display: 'flex', flexDirection: 'column', width: '100%', maxWidth: '393px', margin: '0 auto'}}>
                    <StatusBar />
                    <div style={{padding: '0 16px', marginBottom: '24px', flexShrink: 0, width: '100%', boxSizing: 'border-box'}}>
                        <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%'}}>
                            <div onClick={onReset} style={{display: 'flex', gap: '4px', alignItems: 'center', cursor: 'pointer'}}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="#4062CC" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                                <p style={{fontWeight: 600, fontSize: '16px', color: '#4062cc', margin: 0}}>Back</p>
                            </div>
                            <button onClick={toggleDesign} style={{padding: '6px 12px', borderRadius: '6px', border: '1px solid #4062cc', backgroundColor: 'white', color: '#4062cc', fontSize: '11px', fontWeight: 600, cursor: 'pointer'}}>Try New Design</button>
                        </div>
                    </div>
                    <div style={{flex: 1, overflowY: 'auto', paddingBottom: '80px', width: '100%'}}>
                        <div style={{padding: '0 16px', marginBottom: '24px', width: '100%', boxSizing: 'border-box'}}>
                            <div style={{width: '100%', height: '220px', border: '1px solid #edeff3', borderRadius: '20px', boxShadow: '0px 4px 20px 0px rgba(173, 173, 173, 0.25)', backgroundColor: '#f5f5f5', display: 'flex', flexDirection: 'column', padding: '24px', boxSizing: 'border-box'}}>
                                <div style={{fontSize: '32px', fontWeight: 700, color: '#000000', marginBottom: 'auto'}}>Presentkort</div>
                                <div style={{fontSize: '48px', fontWeight: 400, color: '#000000', marginTop: 'auto', paddingBottom: '20px', letterSpacing: '2px'}}>MODERNA MUSEET</div>
                            </div>
                        </div>
                        <div style={{padding: '0 16px', display: 'flex', flexDirection: 'column', gap: '16px', width: '100%', boxSizing: 'border-box'}}>
                            <button onClick={onRevealCode} style={{backgroundColor: '#4062cc', color: 'white', padding: '12px 32px', borderRadius: '42px', border: 'none', fontWeight: 600, fontSize: '14px', width: '100%', cursor: 'pointer'}}>Reveal Value Code</button>
                            <button onClick={onTopUpCard} style={{backgroundColor: '#ff534a', color: 'white', padding: '12px 32px', borderRadius: '42px', border: 'none', fontWeight: 600, fontSize: '14px', width: '100%', cursor: 'pointer'}}>Top Up Card</button>
                            <div style={{display: 'flex', flexDirection: 'column', gap: '8px', fontWeight: 500, fontSize: '16px', color: '#000000'}}>
                                <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between'}}><p style={{margin: 0}}>Card ID</p><p style={{margin: 0}}>{config.cardId}</p></div>
                                <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between'}}><p style={{margin: 0}}>Balance</p><p style={{margin: 0}}>{cardBalance} {config.currency}</p></div>
                                <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between'}}><p style={{margin: 0}}>Valid Through</p><p style={{margin: 0}}>{config.validThrough}</p></div>
                            </div>
                        </div>
                        <div style={{padding: 0, marginTop: '24px', display: 'flex', flexDirection: 'column', width: '100%'}}>
                            {['View Greeting', 'Transaction History', 'Brand Information', 'Terms & Policies'].map((item, i) => (
                                <div key={i} style={{width: '100%', borderBottom: i < 3 ? '1px solid #ececec' : 'none', padding: '14px 16px', cursor: 'pointer', boxSizing: 'border-box'}}><p style={{fontWeight: 700, fontSize: '14px', color: '#4062cc', margin: 0}}>{item}</p></div>
                            ))}
                        </div>
                        <div style={{padding: '0 16px', marginTop: '24px', marginBottom: '24px', width: '100%', boxSizing: 'border-box'}}>
                            <button style={{width: '100%', backgroundColor: 'white', border: '1px solid #979797', borderRadius: '42px', padding: '12px 32px', fontWeight: 600, fontSize: '16px', color: '#979797', cursor: 'pointer'}}>Delete Card</button>
                        </div>
                    </div>
                    <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} />
                </div>
            );
        }

        function CardDetailsScreenNew({ config, cardBalance, onRevealCode, onTopUpCard, onReset, activeTab, setActiveTab, toggleDesign }) {
            return (
                <div style={{height: '100vh', backgroundColor: 'white', display: 'flex', flexDirection: 'column', width: '100%', maxWidth: '393px', margin: '0 auto'}}>
                    <StatusBar />
                    <div style={{padding: '0 16px', marginBottom: '24px', flexShrink: 0, width: '100%', boxSizing: 'border-box'}}>
                        <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%'}}>
                            <div onClick={onReset} style={{display: 'flex', gap: '4px', alignItems: 'center', cursor: 'pointer'}}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="#4062CC" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                                <p style={{fontWeight: 600, fontSize: '16px', color: '#4062cc', margin: 0}}>Back</p>
                            </div>
                            <button onClick={toggleDesign} style={{padding: '6px 12px', borderRadius: '6px', border: '1px solid #ff534a', backgroundColor: 'white', color: '#ff534a', fontSize: '11px', fontWeight: 600, cursor: 'pointer'}}>Original Design</button>
                        </div>
                    </div>
                    <div style={{flex: 1, overflowY: 'auto', paddingBottom: '80px', width: '100%'}}>
                        <div style={{padding: '0 16px', marginBottom: '20px', width: '100%', boxSizing: 'border-box'}}>
                            <div style={{width: '100%', height: '220px', border: '1px solid #edeff3', borderRadius: '20px', boxShadow: '0px 4px 20px 0px rgba(173, 173, 173, 0.25)', backgroundColor: '#f5f5f5', display: 'flex', flexDirection: 'column', padding: '24px', boxSizing: 'border-box'}}>
                                <div style={{fontSize: '32px', fontWeight: 700, color: '#000000', marginBottom: 'auto'}}>Presentkort</div>
                                <div style={{fontSize: '48px', fontWeight: 400, color: '#000000', marginTop: 'auto', paddingBottom: '20px', letterSpacing: '2px'}}>MODERNA MUSEET</div>
                            </div>
                        </div>
                        <div style={{padding: '0 16px', marginBottom: '20px', width: '100%', boxSizing: 'border-box'}}>
                            <button onClick={onRevealCode} style={{backgroundColor: '#4062cc', color: 'white', padding: '12px 32px', borderRadius: '42px', border: 'none', fontWeight: 600, fontSize: '14px', width: '100%', cursor: 'pointer', boxShadow: '0 2px 8px rgba(64, 98, 204, 0.2)'}}>Reveal Value Code</button>
                        </div>
                        <div style={{padding: '0 16px', marginBottom: '20px', width: '100%', boxSizing: 'border-box'}}>
                            <div style={{backgroundColor: '#F8FAFC', border: '1px solid #E2E8F0', borderRadius: '12px', padding: '16px', boxSizing: 'border-box', display: 'flex', flexDirection: 'column', gap: '12px'}}>
                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                    <span style={{fontSize: '20px', fontWeight: 500, color: '#64748B'}}>Balance</span>
                                    <span style={{fontSize: '20px', fontWeight: 700, color: '#0F172A'}}>{cardBalance} {config.currency}</span>
                                </div>
                                <div style={{height: '1px', backgroundColor: '#E2E8F0'}}></div>
                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                    <span style={{fontSize: '14px', fontWeight: 500, color: '#64748B'}}>Card ID</span>
                                    <span style={{fontSize: '14px', fontWeight: 500, color: '#0F172A'}}>{config.cardId}</span>
                                </div>
                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                    <span style={{fontSize: '14px', fontWeight: 500, color: '#64748B'}}>Valid Through</span>
                                    <span style={{fontSize: '14px', fontWeight: 500, color: '#0F172A'}}>{config.validThrough}</span>
                                </div>
                                <button onClick={onTopUpCard} style={{backgroundColor: '#DC2626', color: 'white', padding: '10px 20px', borderRadius: '8px', border: 'none', fontWeight: 600, fontSize: '14px', width: '100%', cursor: 'pointer', marginTop: '4px'}}>Top Up Balance</button>
                            </div>
                        </div>
                        <div style={{padding: 0, marginTop: '24px', display: 'flex', flexDirection: 'column', width: '100%'}}>
                            {['View Greeting', 'Transaction History', 'Brand Information', 'Terms & Policies'].map((item, i) => (
                                <div key={i} style={{width: '100%', borderBottom: i < 3 ? '1px solid #ececec' : 'none', padding: '14px 16px', cursor: 'pointer', boxSizing: 'border-box'}}><p style={{fontWeight: 700, fontSize: '14px', color: '#4062cc', margin: 0}}>{item}</p></div>
                            ))}
                        </div>
                        <div style={{padding: '0 16px', marginTop: '24px', marginBottom: '24px', width: '100%', boxSizing: 'border-box'}}>
                            <button style={{width: '100%', backgroundColor: 'white', border: '1px solid #979797', borderRadius: '42px', padding: '12px 32px', fontWeight: 600, fontSize: '16px', color: '#979797', cursor: 'pointer'}}>Delete Card</button>
                        </div>
                    </div>
                    <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} />
                </div>
            );
        }
      function EnterPurchaseAmountScreen({ config, cardBalance, purchaseAmount, setPurchaseAmount, onNext, onBack, showMoreExpanded, setShowMoreExpanded, onTopUp, activeTab, setActiveTab }) {
            const purchaseValue = parseFloat(purchaseAmount) || 0;
            const hasShortfall = purchaseValue > cardBalance;
            const shortfall = hasShortfall ? purchaseValue - cardBalance : 0;
            const inputRef = useRef(null);
            return (
                <div style={{height: '100vh', display: 'flex', flexDirection: 'column', backgroundColor: 'white', width: '100%', maxWidth: '393px', margin: '0 auto'}}>
                    <style>{`input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}input[type=number]{-moz-appearance:textfield;appearance:textfield;}`}</style>
                    <StatusBar />
                    <div style={{backgroundColor: 'white', padding: '12px 16px', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', flexShrink: 0, width: '100%', boxSizing: 'border-box'}}>
                        <button onClick={onBack} style={{position: 'absolute', left: '16px', display: 'flex', gap: '4px', alignItems: 'center', backgroundColor: 'transparent', border: 'none', padding: 0, cursor: 'pointer'}}>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="#4062CC" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                            <p style={{fontWeight: 600, fontSize: '16px', color: '#4062cc', margin: 0}}>Back</p>
                        </button>
                        <h1 style={{fontSize: '18px', fontWeight: 'bold', color: 'black', margin: 0}}>Enter Purchase Amount</h1>
                    </div>
                    <div style={{flex: 1, overflowY: 'auto', padding: '16px', paddingBottom: '100px', width: '100%', boxSizing: 'border-box'}}>
                        <div style={{borderRadius: '16px', padding: '16px', marginBottom: '16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', backgroundColor: '#FFF9F0', border: '1px solid #F0E5D3'}}>
                            <span style={{fontSize: '14px', color: '#B4A89A'}}>Current Gift Card Balance</span>
                            <span style={{fontSize: '18px', fontWeight: 'bold', color: 'black'}}>{cardBalance} {config.currency}</span>
                        </div>
                        <div style={{marginBottom: '16px'}}>
                            <div onClick={() => inputRef.current?.focus()} style={{backgroundColor: 'white', borderRadius: '999px', padding: '12px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'text', border: '1px solid #E5E5E5'}}>
                                <span style={{fontSize: '14px', color: '#B4A89A'}}>Enter Purchase Amount</span>
                                <div style={{display: 'flex', alignItems: 'center', gap: '8px'}}>
                                    <input ref={inputRef} type="number" value={purchaseAmount} onChange={(e) => setPurchaseAmount(e.target.value)} style={{fontSize: '18px', fontWeight: 'bold', color: 'black', textAlign: 'right', backgroundColor: 'transparent', border: 'none', outline: 'none', width: '80px'}} placeholder="0" inputMode="numeric" />
                                    <span style={{fontSize: '16px', color: '#B4A89A'}}>{config.currency}</span>
                                </div>
                            </div>
                        </div>
                        {hasShortfall && (
                            <div style={{borderRadius: '16px', padding: '16px', marginBottom: '16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', backgroundColor: '#FFF5F5', border: '2px solid #FF4444'}}>
                                <span style={{fontSize: '14px', fontWeight: 600, color: 'black'}}>Gift Card Balance Shortfall</span>
                                <span style={{fontSize: '18px', fontWeight: 'bold', color: '#FF4444'}}>-{Math.round(shortfall)} {config.currency}</span>
                            </div>
                        )}
                        <div style={{marginBottom: '16px'}}>
                            <p style={{fontSize: '14px', lineHeight: '1.5', color: 'black', fontWeight: 500, marginBottom: '4px'}}>Enter your purchase amount above to check if your Card balance is sufficient to complete your purchase.</p>
                            {showMoreExpanded ? (<><p style={{fontSize: '14px', lineHeight: '1.5', color: 'black', marginTop: '12px'}}><p style={{fontSize: '14px', lineHeight: '1.5', color: 'black', marginTop: '12px'}}>Once you filled in the total purchase amount above, you can top-up the Gift Card if the Card balance is lesser than the purchase amount.</p></>) : (<button onClick={() => setShowMoreExpanded(true)} style={{fontSize: '14px', fontWeight: 500, fontStyle: 'italic', marginTop: '4px', color: '#666', backgroundColor: 'transparent', border: 'none', padding: 0, cursor: 'pointer'}}>..... Show more</button>)}
                        </div>
                        <div style={{backgroundColor: '#FFF9E6', border: '1px solid #FFD966', borderRadius: '16px', padding: '16px', marginTop: '16px'}}>
                            <div style={{display: 'flex', alignItems: 'flex-start', gap: '8px'}}>
                                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style={{flexShrink: 0, marginTop: '2px'}}>
                                    <circle cx="10" cy="10" r="9" stroke="#B8860B" strokeWidth="1.5"/>
                                    <path d="M10 6V11M10 14V14.5" stroke="#B8860B" strokeWidth="2" strokeLinecap="round"/>
                                </svg>
                                <p style={{fontSize: '14px', lineHeight: '1.5', color: '#5C4A1A', margin: 0}}><strong style={{fontWeight: 700}}>Important:</strong> Your Value Code is valid for one-time use only. It will activate at your current balance, or your new balance after top-up.</p>
                            </div>
                        </div>
                    </div>
                    <div style={{padding: '16px 16px 24px', backgroundColor: 'white', flexShrink: 0, marginBottom: '80px', width: '100%', boxSizing: 'border-box'}}>
                        <div style={{display: 'flex', flexDirection: 'column', gap: '12px'}}>
                            {hasShortfall ? (<><button onClick={onTopUp} style={{width: '100%', backgroundColor: '#5B7FD8', color: 'white', padding: '12px', borderRadius: '999px', border: 'none', fontWeight: 600, fontSize: '16px', cursor: 'pointer'}}>Top-up {Math.round(shortfall)} {config.currency}</button><button onClick={onNext} style={{width: '100%', backgroundColor: 'white', color: '#5B7FD8', padding: '12px', borderRadius: '999px', border: '2px solid #5B7FD8', fontWeight: 600, fontSize: '16px', cursor: 'pointer'}}>Continue with Card Balance</button></>) : (<button onClick={onNext} style={{width: '100%', backgroundColor: '#5B7FD8', color: 'white', padding: '12px', borderRadius: '999px', border: 'none', fontWeight: 600, fontSize: '16px', cursor: 'pointer'}}>Reveal Value Code</button>)}
                        </div>
                    </div>
                    <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} />
                </div>
            );
        }

        function EnterPurchaseAmountScreenFixed({ config, cardBalance, purchaseAmount, setPurchaseAmount, selectedDenomination, onDenominationSelect, onNext, onBack, showMoreExpanded, setShowMoreExpanded, onPaymentOptions, activeTab, setActiveTab }) {

            const toggleDesign = () => setUseNewDesign(!useNewDesign);

            const handleTopUpCard = () => { setFlowType('direct-topup'); setTopUpAmount(''); setScreen('direct-topup-amount'); };
            const handleDirectTopUpConfirm = () => { const amount = parseFloat(topUpAmount); if (isNaN(amount) || amount <= 0) return; setScreen('payment-options'); };

            const handleSuccessNext = () => { if (flowType === 'reveal-code') { setScreen('code-revealed'); } else { resetFlow(); } };
            const resetFlow = () => { setScreen('card-details'); setPurchaseAmount(''); setTopUpAmount(''); setSelectedPaymentMethod(''); setFlowType(''); setShowMoreExpanded(false); };
            const screens = {
                'card-details': <CardDetailsScreen config={config} cardBalance={cardBalance} onRevealCode={handleRevealCode} onTopUpCard={handleTopUpCard} onReset={onReset} activeTab={activeTab} setActiveTab={setActiveTab} useNewDesign={useNewDesign} toggleDesign={toggleDesign} />,
                'enter-purchase-amount': <EnterPurchaseAmountScreen config={config} cardBalance={cardBalance} purchaseAmount={purchaseAmount} setPurchaseAmount={setPurchaseAmount} onNext={handlePurchaseAmountNext} onBack={resetFlow} showMoreExpanded={showMoreExpanded} setShowMoreExpanded={setShowMoreExpanded} onTopUp={handleTopUpFromPurchase} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'direct-topup-amount': <DirectTopUpAmountScreen config={config} topUpAmount={topUpAmount} setTopUpAmount={setTopUpAmount} onConfirm={handleDirectTopUpConfirm} onBack={resetFlow} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'payment-options': <PaymentOptionsScreen onSelect={handlePaymentMethodSelect} onBack={() => setScreen(flowType === 'reveal-code' ? 'enter-purchase-amount' : 'direct-topup-amount')} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'payment-processing': <PaymentProcessingScreen activeTab={activeTab} setActiveTab={setActiveTab} />,
                'payment-success': <PaymentSuccessScreen amount={topUpAmount} currency={config.currency} balance={cardBalance} onNext={handleSuccessNext} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'code-revealed': <CodeRevealedScreen balance={cardBalance} currency={config.currency} onBack={resetFlow} activeTab={activeTab} setActiveTab={setActiveTab} />
            };
            return screens[screen];
        }

        function FixedWorkflow({ onReset }) {
            const [screen, setScreen] = useState('card-details');
            const [cardBalance, setCardBalance] = useState(FIXED_CONFIG.cardBalance);
            const [purchaseAmount, setPurchaseAmount] = useState('');
            const [selectedDenomination, setSelectedDenomination] = useState(null);
            const [selectedPaymentMethod, setSelectedPaymentMethod] = useState('');
            const [flowType, setFlowType] = useState('');
            const [showMoreExpanded, setShowMoreExpanded] = useState(false);
            const [activeTab, setActiveTab] = useState('cards');
            const [useNewDesign, setUseNewDesign] = useState(false);
            const config = FIXED_CONFIG;
            const toggleDesign = () => setUseNewDesign(!useNewDesign);
            const handleRevealCode = () => { setFlowType('reveal-code'); setScreen('enter-purchase-amount'); setSelectedDenomination(null); };
            const handleTopUpCard = () => { setFlowType('direct-topup'); setSelectedDenomination(null); setScreen('direct-topup-denomination'); };
            const handleDirectTopUpConfirm = () => { if (!selectedDenomination) return; setScreen('payment-options'); };
            const handleDenominationSelect = (amount) => { setSelectedDenomination(amount); };
            const handlePurchaseAmountNext = () => { setScreen('code-revealed'); };
            const handleTopUpFromPurchase = () => { if (!selectedDenomination) return; setScreen('payment-options'); };
            const handlePaymentMethodSelect = (methodId) => { setSelectedPaymentMethod(methodId); setScreen('payment-processing'); setTimeout(() => { setCardBalance(prev => prev + selectedDenomination); setScreen('payment-success'); }, 2000); };
            const handleSuccessNext = () => { if (flowType === 'reveal-code') { setScreen('code-revealed'); } else { resetFlow(); } };
            const resetFlow = () => { setScreen('card-details'); setPurchaseAmount(''); setSelectedDenomination(null); setSelectedPaymentMethod(''); setFlowType(''); setShowMoreExpanded(false); };
            const screens = {
                'card-details': <CardDetailsScreen config={config} cardBalance={cardBalance} onRevealCode={handleRevealCode} onTopUpCard={handleTopUpCard} onReset={onReset} activeTab={activeTab} setActiveTab={setActiveTab} useNewDesign={useNewDesign} toggleDesign={toggleDesign} />,
                'enter-purchase-amount': <EnterPurchaseAmountScreenFixed config={config} cardBalance={cardBalance} purchaseAmount={purchaseAmount} setPurchaseAmount={setPurchaseAmount} selectedDenomination={selectedDenomination} onDenominationSelect={handleDenominationSelect} onNext={handlePurchaseAmountNext} onBack={resetFlow} showMoreExpanded={showMoreExpanded} setShowMoreExpanded={setShowMoreExpanded} onPaymentOptions={handleTopUpFromPurchase} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'direct-topup-denomination': <DirectTopUpDenominationScreen config={config} selectedDenomination={selectedDenomination} onDenominationSelect={handleDenominationSelect} onConfirm={handleDirectTopUpConfirm} onBack={resetFlow} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'payment-options': <PaymentOptionsScreen onSelect={handlePaymentMethodSelect} onBack={() => setScreen(flowType === 'reveal-code' ? 'enter-purchase-amount' : 'direct-topup-denomination')} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'payment-processing': <PaymentProcessingScreen activeTab={activeTab} setActiveTab={setActiveTab} />,
                'payment-success': <PaymentSuccessScreen amount={selectedDenomination} currency={config.currency} balance={cardBalance} onNext={handleSuccessNext} activeTab={activeTab} setActiveTab={setActiveTab} />,
                'code-revealed': <CodeRevealedScreen balance={cardBalance} currency={config.currency} onBack={resetFlow} activeTab={activeTab} setActiveTab={setActiveTab} />
            };
            return screens[screen];
        }

        function App() {
            const [workflowType, setWorkflowType] = useState(null);
            if (!workflowType) {
                return <WorkflowSelector onSelect={setWorkflowType} />;
            }
            return (
                <div style={{backgroundColor: '#f0f0f0', minHeight: '100vh', display: 'flex', justifyContent: 'center'}}>
                    {workflowType === 'freehand' ? (<FreehandWorkflow onReset={() => setWorkflowType(null)} />) : (<FixedWorkflow onReset={() => setWorkflowType(null)} />)}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
